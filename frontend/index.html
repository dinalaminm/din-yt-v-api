<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #3498db;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 2s linear infinite;
            display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">

    <div class="container mx-auto px-4 py-10 max-w-4xl">
        <h1 class="text-4xl font-bold text-center text-red-600 mb-8">
            <i class="fab fa-youtube"></i> Video Downloader
        </h1>

        <!-- Search Bar -->
        <div class="bg-white rounded-lg shadow-md p-6 mb-8">
            <div class="flex flex-col md:flex-row gap-4">
                <input id="videoUrl" type="text" placeholder="Paste YouTube Link or Keyword here..." 
                    class="flex-1 border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="getMetadata()" class="bg-blue-600 text-white px-6 py-3 rounded-lg hover:bg-blue-700 transition">
                    Analyze Video
                </button>
                <button onclick="searchVideos()" class="bg-gray-800 text-white px-6 py-3 rounded-lg hover:bg-black transition">
                    Search
                </button>
            </div>
            <div id="loader" class="loader mx-auto mt-4"></div>
        </div>

        <!-- Video Metadata Area (Hidden initially) -->
        <div id="videoInfo" class="bg-white rounded-lg shadow-lg p-6 hidden">
            <div class="flex flex-col md:flex-row gap-6">
                <img id="thumbnail" src="" alt="Thumbnail" class="w-full md:w-64 rounded-lg shadow">
                <div class="flex-1">
                    <h2 id="videoTitle" class="text-xl font-bold mb-2 text-gray-800"></h2>
                    <p id="channelName" class="text-gray-600 mb-4"></p>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Select Quality</label>
                            <select id="qualitySelect" class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                                <!-- Qualities will be loaded here -->
                            </select>
                        </div>
                        <div class="flex items-end">
                            <button onclick="startDownload()" id="downloadBtn" class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition">
                                <i class="fas fa-download"></i> Start Download
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            <div id="downloadStatus" class="mt-4 p-3 rounded hidden"></div>
        </div>

        <!-- Search Results Area -->
        <div id="searchResults" class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8"></div>
    </div>

    <script>
        const API_BASE = window.location.origin + "/api"; // এপিআই ইউআরএল অটোমেটিক সেট হবে

        // ১. ভিডিওর ডিটেইলস আনা
        async function getMetadata(url = null) {
            const videoUrl = url || document.getElementById('videoUrl').value;
            if (!videoUrl) return alert("Please enter a URL or keyword");

            showLoader(true);
            try {
                const response = await fetch(`${API_BASE}/v1/metadata?url=${encodeURIComponent(videoUrl)}`);
                const data = await response.json();

                if (response.ok) {
                    displayMetadata(data, videoUrl);
                } else {
                    alert("Error: " + data.detail);
                }
            } catch (err) {
                alert("Could not connect to API");
            } finally {
                showLoader(false);
            }
        }

        // ২. ডিটেইলস ডিসপ্লে করা
        function displayMetadata(data, originalUrl) {
            document.getElementById('videoInfo').classList.remove('hidden');
            document.getElementById('searchResults').innerHTML = "";
            document.getElementById('videoTitle').innerText = data.title;
            document.getElementById('channelName').innerText = "Channel: " + data.channel;
            document.getElementById('thumbnail').src = data.thumbnail;

            const select = document.getElementById('qualitySelect');
            select.innerHTML = "";

            // ভিডিও ফরম্যাট যোগ করা
            data.video.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.quality;
                opt.innerText = `Video: ${v.quality} (${v.size || 'N/A'})`;
                select.appendChild(opt);
            });

            // অডিও ফরম্যাট যোগ করা
            data.audio.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.quality;
                opt.innerText = `Audio: ${a.quality} (${a.size || 'N/A'})`;
                select.appendChild(opt);
            });

            // ডাউনলোড বাটনের জন্য ইউআরএল সেভ করে রাখা
            window.currentVideoUrl = originalUrl;
        }

        // ৩. ভিডিও ডাউনলোড শুরু করা
        async function startDownload() {
            const quality = document.getElementById('qualitySelect').value;
            const statusDiv = document.getElementById('downloadStatus');
            const btn = document.getElementById('downloadBtn');

            statusDiv.classList.remove('hidden', 'bg-red-100', 'bg-green-100');
            statusDiv.classList.add('bg-blue-100');
            statusDiv.innerText = "Processing download... Please wait. This may take a minute.";
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/v1/download`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: window.currentVideoUrl,
                        quality: quality
                    })
                });

                const result = await response.json();
                if (response.ok) {
                    statusDiv.classList.replace('bg-blue-100', 'bg-green-100');
                    statusDiv.innerHTML = `Success! <a href="${result.link}?download=true" class="text-blue-700 font-bold underline">Click here to save file</a>`;
                } else {
                    throw new Error(result.detail);
                }
            } catch (err) {
                statusDiv.classList.replace('bg-blue-100', 'bg-red-100');
                statusDiv.innerText = "Error: " + err.message;
            } finally {
                btn.disabled = false;
            }
        }

        // ৪. ভিডিও সার্চ করা
        async function searchVideos() {
            const q = document.getElementById('videoUrl').value;
            if (!q) return alert("Enter keyword to search");

            showLoader(true);
            try {
                const response = await fetch(`${API_BASE}/v1/search?q=${encodeURIComponent(q)}&limit=6`);
                const data = await response.json();
                
                const resultsDiv = document.getElementById('searchResults');
                resultsDiv.innerHTML = "";
                document.getElementById('videoInfo').classList.add('hidden');

                data.results.forEach(video => {
                    resultsDiv.innerHTML += `
                        <div class="bg-white p-4 rounded shadow hover:shadow-md cursor-pointer transition" onclick="getMetadata('${video.id}')">
                            <img src="https://img.youtube.com/vi/${video.id}/mqdefault.jpg" class="w-full rounded mb-2">
                            <h3 class="font-bold text-sm line-clamp-2">${video.title}</h3>
                            <p class="text-xs text-gray-500 mt-1">Duration: ${video.duration}</p>
                        </div>
                    `;
                });
            } catch (err) {
                alert("Search failed");
            } finally {
                showLoader(false);
            }
        }

        function showLoader(show) {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        }
    </script>
</body>
</html>
